name: SetPlayer
options:
  bundleIdPrefix: com.jarmourato
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  SetPlayer:
    type: application
    platform: macOS
    sources:
      - SetPlayer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jarmourato.SetPlayer
        PRODUCT_NAME: SetPlayer
        INFOPLIST_FILE: SetPlayer/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
    info:
      path: SetPlayer/Info.plist
      properties:
        CFBundleName: SetPlayer
        CFBundleDisplayName: SetPlayer
        CFBundleIdentifier: com.jarmourato.SetPlayer
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: SetPlayer
        LSMinimumSystemVersion: "14.0"
        LSUIElement: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
